name: Perch Flutter CI

on:
  pull_request:
    paths:
      - 'native/perch_today_scene/**'
      - '.github/workflows/flutter-perch.yml'
  push:
    branches:
      - main
      - feat/perch-core-foundation
    paths:
      - 'native/perch_today_scene/**'
      - '.github/workflows/flutter-perch.yml'

concurrency:
  group: perch-flutter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/perch_today_scene

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Report tool versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze for errors and warnings
        run: flutter analyze --no-fatal-infos

      - name: Report strict lint debt
        continue-on-error: true
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter=expanded

  windows-build:
    name: Build Windows desktop
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native/perch_today_scene

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release
