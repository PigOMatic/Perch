<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Perch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f0ebe0; --cream2: #ede7d9; --card: #ffffff;
    --ink: #1e1c14; --ink2: #2d2a1e;
    --green: #2d6a4f; --green-check: #3a8c62; --green-bg: #eef7f2;
    --orange: #e07b39;
    --muted: #7a7060; --muted2: #a09880;
    --border: rgba(30,28,20,0.10);
    --shadow: 0 2px 12px rgba(30,28,20,0.08);
    --radius: 18px;
  }

  html, body {
    background: var(--cream);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: var(--ink); min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
  }

  /* Splash — shown briefly while redirect fires */
  .splash {
    text-align: center; max-width: 320px;
  }
  .eagle-wrap {
    position: relative; display: inline-block; margin-bottom: 20px;
  }
  .eagle { font-size: 56px; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(45,106,79,0.15), transparent 70%);
    border-radius: 50%; animation: gp 2s ease-in-out infinite;
  }
  @keyframes gp { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} }

  .wordmark {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px; font-weight: 800;
    color: var(--ink2); letter-spacing: -0.02em; margin-bottom: 6px;
  }
  .tagline { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.5; }

  /* Loading bar */
  .loader-track {
    width: 160px; height: 3px;
    background: rgba(30,28,20,0.08);
    border-radius: 99px; margin: 0 auto 24px; overflow: hidden;
  }
  .loader-fill {
    height: 3px; background: var(--green);
    border-radius: 99px; width: 0;
    animation: load 1.2s ease forwards;
  }
  @keyframes load { 0%{width:0} 60%{width:80%} 100%{width:100%} }

  .loading-text { font-size: 13px; color: var(--muted2); margin-bottom: 28px; }

  /* Fallback nav — shown if redirect fails */
  .nav-links { display: none; flex-direction: column; gap: 10px; width: 100%; }
  .nav-links.visible { display: flex; }
  .nav-link {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow); text-decoration: none; color: var(--ink);
    font-size: 15px; font-weight: 600; transition: background 0.15s;
  }
  .nav-link:active { background: var(--green-bg); }
  .nav-link-icon { font-size: 22px; }
  .nav-link-label { flex: 1; }
  .nav-link-arrow { color: var(--muted2); font-size: 18px; }

  /* Error box */
  .error-box {
    display: none; background: #fef2f2; border: 1px solid #fecdd3;
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 13px; color: #c0392b; line-height: 1.5;
    margin-bottom: 16px; text-align: left; width: 100%;
  }
  .error-box.visible { display: block; }

  /* File checklist */
  .file-check { margin-top: 20px; text-align: left; width: 100%; }
  .file-check-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted2); margin-bottom: 8px; }
  .file-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 0; color: var(--muted); }
  .file-status { width: 16px; text-align: center; font-size: 13px; }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="eagle-wrap">
    <div class="glow"></div>
    <span class="eagle">🦅</span>
  </div>
  <div class="wordmark">Perch</div>
  <div class="tagline">Operational clarity<br>for overloaded lives.</div>

  <div class="loader-track"><div class="loader-fill" id="loader"></div></div>
  <div class="loading-text" id="loading-text">Loading…</div>

  <!-- Error box — shown if files missing -->
  <div class="error-box" id="error-box"></div>

  <!-- Fallback nav — shown if redirect fails after 2s -->
  <div class="nav-links" id="nav-links">
    <a class="nav-link" href="perch_today_live.html">
      <span class="nav-link-icon">🏠</span>
      <span class="nav-link-label">Today</span>
      <span class="nav-link-arrow">›</span>
    </a>
    <a class="nav-link" href="perch_week_live.html">
      <span class="nav-link-icon">📅</span>
      <span class="nav-link-label">Week</span>
      <span class="nav-link-arrow">›</span>
    </a>
    <a class="nav-link" href="perch_capture.html">
      <span class="nav-link-icon">🦅</span>
      <span class="nav-link-label">Perch (Capture)</span>
      <span class="nav-link-arrow">›</span>
    </a>
  </div>

  <!-- File checklist — shown on error -->
  <div class="file-check" id="file-check" style="display:none">
    <div class="file-check-title">Required files</div>
    <div class="file-row"><span class="file-status" id="fs-core">⏳</span><span>perch_core.js</span></div>
    <div class="file-row"><span class="file-status" id="fs-today">⏳</span><span>perch_today_live.html</span></div>
    <div class="file-row"><span class="file-status" id="fs-week">⏳</span><span>perch_week_live.html</span></div>
    <div class="file-row"><span class="file-status" id="fs-capture">⏳</span><span>perch_capture.html</span></div>
  </div>
</div>

<script>
  const FILES = [
    { id: 'fs-core',    path: 'perch_core.js',          label: 'perch_core.js' },
    { id: 'fs-today',   path: 'perch_today_live.html',  label: 'perch_today_live.html' },
    { id: 'fs-week',    path: 'perch_week_live.html',   label: 'perch_week_live.html' },
    { id: 'fs-capture', path: 'perch_capture.html',     label: 'perch_capture.html' },
  ];

  async function checkFile(path) {
    try {
      const r = await fetch(path, { method: 'HEAD' });
      return r.ok;
    } catch { return false; }
  }

  async function boot() {
    // 1. Try immediate redirect — fastest path
    document.getElementById('loading-text').textContent = 'Opening Today…';

    // Small pause so the loader animation is visible
    await new Promise(r => setTimeout(r, 900));

    // 2. Check if core file is reachable
    const coreOk = await checkFile('perch_core.js');
    const todayOk = await checkFile('perch_today_live.html');

    if (coreOk && todayOk) {
      // All good — redirect
      document.getElementById('loading-text').textContent = 'Ready.';
      window.location.replace('perch_today_live.html');
      return;
    }

    // 3. Something missing — run full check and show fallback
    document.getElementById('loading-text').textContent = 'Some files could not be found.';
    document.getElementById('file-check').style.display = 'block';

    const errors = [];
    for (const f of FILES) {
      const ok = await checkFile(f.path);
      document.getElementById(f.id).textContent = ok ? '✅' : '❌';
      if (!ok) errors.push(f.label);
    }

    if (errors.length) {
      const box = document.getElementById('error-box');
      box.textContent = `Missing files: ${errors.join(', ')}. Make sure all files are uploaded to the same Netlify folder.`;
      box.classList.add('visible');
    }

    // Show manual nav so user isn't stuck
    document.getElementById('nav-links').classList.add('visible');
  }

  boot();
</script>
</body>
</html>
